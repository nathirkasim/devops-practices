<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page">
    <main class="calculator" aria-label="Calculator">
      <div class="display" id="display">
        <div class="display__history" id="history" aria-hidden="true">&nbsp;</div>
        <div class="display__result" id="result" aria-live="polite">0</div>
      </div>

      <div class="keys">
        <button class="key key--func" data-action="clear" type="button">C</button>
        <button class="key key--func" data-action="backspace" type="button" aria-label="Backspace">⌫</button>
        <button class="key key--func" data-action="percent" type="button">%</button>
        <button class="key key--op" data-operator="/" type="button" aria-label="Divide">÷</button>

        <button class="key key--digit" data-digit="7" type="button">7</button>
        <button class="key key--digit" data-digit="8" type="button">8</button>
        <button class="key key--digit" data-digit="9" type="button">9</button>
        <button class="key key--op" data-operator="*" type="button" aria-label="Multiply">×</button>

        <button class="key key--digit" data-digit="4" type="button">4</button>
        <button class="key key--digit" data-digit="5" type="button">5</button>
        <button class="key key--digit" data-digit="6" type="button">6</button>
        <button class="key key--op" data-operator="-" type="button" aria-label="Subtract">−</button>

        <button class="key key--digit" data-digit="1" type="button">1</button>
        <button class="key key--digit" data-digit="2" type="button">2</button>
        <button class="key key--digit" data-digit="3" type="button">3</button>
        <button class="key key--op" data-operator="+" type="button" aria-label="Add">+</button>

        <button class="key key--digit key--zero" data-digit="0" type="button">0</button>
        <button class="key key--digit" data-action="decimal" type="button">.</button>
        <button class="key key--equals" data-action="equals" type="button" aria-label="Equals">=</button>
      </div>

      <p class="status" id="status" role="status">&nbsp;</p>
    </main>

    <p class="credit">Node.js + Express · calculator.js logic shared with the CLI</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
